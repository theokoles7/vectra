name: Release

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"   # Triggers when version is bumped

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install towncrier

      - name: Read version
        id: version
        run: |
          VERSION=$(python -c "import tomllib; d = tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build changelog
        run: towncrier build --yes --version ${{ steps.version.outputs.version }}

      - name: Commit & tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md changelog.d/
          git commit -m "Release v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   "v${{ steps.version.outputs.version }}"
          name:       "v${{ steps.version.outputs.version }}"
          body_path:  CHANGELOG.md