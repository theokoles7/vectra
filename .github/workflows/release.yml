name: Release

on:
  push:
    branches: [main]
    paths:
      - ".semversioner/next-release/*.json"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install semversioner

      - name: Release
        run: semversioner release

      - name: Generate changelog
        run: semversioner changelog > CHANGELOG.md

      - name: Read version
        id: version
        run: |
          VERSION=$(semversioner current-version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update pyproject.toml version
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml

      - name: Commit & tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md .semversioner/ pyproject.toml
          git commit -m "Release v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name:     "v${{ steps.version.outputs.version }}"
          body_path: CHANGELOG.md